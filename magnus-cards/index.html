<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MagnusCards ⭐</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    :root {
      --bg: #FFFDF8;
      --shadow: 0 6px 24px rgba(0,0,0,.10);
      --r: 22px;
    }

    html, body {
      height: 100%; font-family: 'Nunito', sans-serif;
      background: var(--bg); color: #1a1a1a;
      overscroll-behavior: none; -webkit-font-smoothing: antialiased;
    }

    /* ── Screens ──────────────────────────────────────────────────── */
    .screen { display: none; min-height: 100dvh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ══════════════════════════════════════════════════════════════
       HOME SCREEN
    ══════════════════════════════════════════════════════════════ */
    #homeScreen { background: var(--bg); }

    .home-header {
      background: linear-gradient(135deg, #FF6B9D, #FF9A5C);
      padding: 28px 20px 24px;
      text-align: center; color: white;
      padding-top: max(28px, env(safe-area-inset-top));
    }
    .home-logo { font-size: 44px; line-height: 1; }
    .home-title { font-size: 30px; font-weight: 900; margin-top: 6px; letter-spacing: -.5px; }
    .home-sub { font-size: 15px; font-weight: 700; opacity: .85; margin-top: 4px; }

    /* Category filter */
    .cat-scroll {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 16px 18px 8px;
      scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; padding: 8px 16px;
      border: none; border-radius: 99px;
      font: 800 13px 'Nunito',sans-serif;
      cursor: pointer; transition: transform .12s, opacity .12s;
      white-space: nowrap;
    }
    .cat-pill:active { transform: scale(.94); }
    .cat-pill.active { box-shadow: 0 3px 12px rgba(0,0,0,.18); }

    /* Cards grid */
    .cards-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; padding: 10px 16px 32px;
    }
    .act-card {
      border-radius: 20px; padding: 20px 14px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; transition: transform .14s, box-shadow .14s;
      box-shadow: 0 4px 14px rgba(0,0,0,.10);
      text-align: center; border: none;
    }
    .act-card:active { transform: scale(.95); box-shadow: 0 2px 6px rgba(0,0,0,.10); }
    .act-icon { font-size: 48px; line-height: 1; }
    .act-name { font-size: 14px; font-weight: 800; line-height: 1.3; color: #1a1a1a; }
    .act-cat-tag { font-size: 11px; font-weight: 700; opacity: .6; }

    /* ══════════════════════════════════════════════════════════════
       STEP SCREEN
    ══════════════════════════════════════════════════════════════ */
    #stepScreen { background: var(--bg); }

    .step-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .back-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: #F0EEF5; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform .1s;
    }
    .back-btn:active { transform: scale(.92); }
    .step-act-title { font-size: 17px; font-weight: 900; line-height: 1.2; flex: 1; }
    .step-counter-badge {
      flex-shrink: 0; padding: 6px 12px; border-radius: 99px;
      font: 800 12px 'Nunito',sans-serif; color: white;
    }

    /* Progress dots */
    .progress-dots {
      display: flex; gap: 6px; justify-content: center;
      padding: 0 20px 14px;
    }
    .dot {
      height: 8px; border-radius: 99px;
      background: #E0E0E0; transition: width .3s, background .3s;
      min-width: 8px;
    }
    .dot.active { width: 24px !important; }
    .dot.done   { background: #ccc; }

    /* The big picture card */
    .picture-card-wrap {
      padding: 0 16px; flex: 1; display: flex; align-items: stretch;
    }
    .picture-card {
      width: 100%; border-radius: 28px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0; padding: 24px 20px 28px;
      box-shadow: 0 8px 36px rgba(0,0,0,.13);
      animation: cardSlide .3s ease;
      min-height: 300px;
    }
    @keyframes cardSlide {
      from { opacity: 0; transform: translateX(60px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .picture-card.back-slide { animation: cardSlideBack .3s ease; }
    @keyframes cardSlideBack {
      from { opacity: 0; transform: translateX(-60px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .card-picture { font-size: 96px; line-height: 1.1; text-align: center; filter: drop-shadow(0 4px 8px rgba(0,0,0,.12)); }
    .card-text {
      margin-top: 20px; font-size: 20px; font-weight: 800; text-align: center;
      line-height: 1.45; color: #1a1a1a; max-width: 300px;
    }

    /* Read aloud */
    .read-aloud-btn {
      margin: 14px auto 0; display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,.08); border: none; border-radius: 99px;
      padding: 8px 16px; font: 700 13px 'Nunito',sans-serif; color: #444;
      cursor: pointer; transition: background .15s;
    }
    .read-aloud-btn:active { background: rgba(0,0,0,.14); }
    .read-aloud-btn.speaking { background: rgba(0,0,0,.14); }

    /* Navigation */
    .step-nav {
      padding: 14px 16px max(20px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 10px;
    }
    .next-btn {
      width: 100%; padding: 18px; border: none; border-radius: 18px;
      font: 900 20px 'Nunito',sans-serif; color: white; cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,.18); transition: transform .1s, box-shadow .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .next-btn:active { transform: scale(.97); box-shadow: 0 3px 10px rgba(0,0,0,.14); }
    .prev-link {
      background: none; border: none; font: 700 14px 'Nunito',sans-serif;
      color: #aaa; cursor: pointer; text-align: center; padding: 4px;
    }

    /* ══════════════════════════════════════════════════════════════
       COMPLETE SCREEN
    ══════════════════════════════════════════════════════════════ */
    #completeScreen {
      align-items: center; justify-content: center; gap: 20px;
      text-align: center; padding: 40px 24px;
    }
    .complete-stars { font-size: 56px; animation: popIn .6s ease; }
    @keyframes popIn { 0%{transform:scale(.3)}70%{transform:scale(1.18)}100%{transform:scale(1)} }
    .complete-title { font-size: 34px; font-weight: 900; }
    .complete-sub { font-size: 17px; color: #666; font-weight: 700; line-height: 1.5; max-width: 280px; }
    .complete-activity { font-size: 20px; font-weight: 900; }
    .complete-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
    .btn-again {
      padding: 16px; border: none; border-radius: 16px; color: white;
      font: 800 16px 'Nunito',sans-serif; cursor: pointer; transition: transform .1s;
    }
    .btn-again:active { transform: scale(.97); }
    .btn-home {
      padding: 14px; background: #F0EEF5; border: none; border-radius: 16px;
      font: 800 15px 'Nunito',sans-serif; color: #555; cursor: pointer; transition: transform .1s;
    }
    .btn-home:active { transform: scale(.97); }

    /* Confetti */
    .confetti { position: fixed; pointer-events: none; border-radius: 3px; animation: cfFall 1.3s ease-out forwards; }
    @keyframes cfFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

    @media (min-width: 480px) {
      .cards-grid { grid-template-columns: 1fr 1fr 1fr; }
      .card-text { font-size: 22px; }
      .card-picture { font-size: 110px; }
    }
  </style>
</head>
<body>

<!-- ══ HOME ════════════════════════════════════════════════════════════════ -->
<div class="screen active" id="homeScreen">
  <div class="home-header">
    <div class="home-logo">⭐</div>
    <div class="home-title">MagnusCards</div>
    <div class="home-sub">Tap a card to learn what to do!</div>
  </div>

  <div class="cat-scroll" id="catScroll"></div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- ══ STEP ════════════════════════════════════════════════════════════════ -->
<div class="screen" id="stepScreen">
  <div class="step-topbar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="step-act-title" id="stepActTitle"></div>
    <div class="step-counter-badge" id="stepBadge"></div>
  </div>

  <div class="progress-dots" id="progressDots"></div>

  <div class="picture-card-wrap">
    <div class="picture-card" id="pictureCard">
      <div class="card-picture" id="cardPicture"></div>
      <div class="card-text"    id="cardText"></div>
    </div>
  </div>

  <button class="read-aloud-btn" id="readAloudBtn" onclick="readAloud()">
    🔊 <span>Read it to me</span>
  </button>

  <div class="step-nav">
    <button class="next-btn" id="nextBtn" onclick="nextStep()">
      <span id="nextLabel">Next</span> <span id="nextArrow">→</span>
    </button>
    <button class="prev-link" id="prevBtn" onclick="prevStep()">← Go back</button>
  </div>
</div>

<!-- ══ COMPLETE ═════════════════════════════════════════════════════════════ -->
<div class="screen" id="completeScreen">
  <div class="complete-stars">⭐⭐⭐</div>
  <div class="complete-title">Amazing!</div>
  <div class="complete-activity" id="completeActivity"></div>
  <div class="complete-sub">You followed every step!<br>You're doing a wonderful job! 🎉</div>
  <div class="complete-btns">
    <button class="btn-again" id="btnAgain" onclick="tryAgain()">Do it again ↩</button>
    <button class="btn-home"                onclick="goHome()">← Back to all cards</button>
  </div>
</div>

//  STATE
// ══════════════════════════════════════════════════════════════════════════
let currentScenario = null, currentStep = 0, currentCat = 'all', speaking = false;

// ══════════════════════════════════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════════════════════════════════
function initHome() {
  // Category pills
  const scroll = document.getElementById('catScroll');
  scroll.innerHTML = `<button class="cat-pill active" style="background:#FF6B9D;color:white" onclick="filterCat('all')">⭐ All</button>`
    + Object.entries(CATS).map(([k,c]) =>
      `<button class="cat-pill" style="background:${c.bg};color:${c.dark}"
        onclick="filterCat('${k}')">${c.name}</button>`
    ).join('');

  renderCards('all');
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach((p,i) => {
    const keys = ['all', ...Object.keys(CATS)];
    const active = keys[i] === cat;
    const c = cat === 'all' ? { color:'#FF6B9D' } : CATS[keys[i]];
    if (active) {
      p.classList.add('active');
      p.style.background = cat === 'all' ? '#FF6B9D' : CATS[cat].color;
      p.style.color = 'white';
    } else {
      p.classList.remove('active');
      const k = keys[i];
      if (k === 'all') { p.style.background='#FFE8F0'; p.style.color='#FF6B9D'; }
      else { p.style.background = CATS[k].bg; p.style.color = CATS[k].dark; }
    }
  });
  renderCards(cat);
}

function renderCards(cat) {
  const grid = document.getElementById('cardsGrid');
  const list = cat === 'all' ? SCENARIOS : SCENARIOS.filter(s => s.cat === cat);
  grid.innerHTML = list.map(s => {
    const c = CATS[s.cat];
    return `<button class="act-card" style="background:${c.bg}" onclick="openScenario('${s.id}')">
      <div class="act-icon">${s.icon}</div>
      <div class="act-name">${s.title}</div>
      <div class="act-cat-tag" style="color:${c.dark}">${c.name}</div>
    </button>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════════════════
//  STEP SCREEN
// ══════════════════════════════════════════════════════════════════════════
function openScenario(id) {
  currentScenario = SCENARIOS.find(s => s.id === id);
  currentStep = 0;
  show('stepScreen');
  renderStep(false);
}

function renderStep(goingBack) {
  const s = currentScenario;
  const step = s.steps[currentStep];
  const c = CATS[s.cat];
  const total = s.steps.length;

  // topbar
  document.getElementById('stepActTitle').textContent = s.title;
  document.getElementById('stepBadge').textContent = `${currentStep+1} / ${total}`;
  document.getElementById('stepBadge').style.background = c.color;

  // progress dots
  const dots = document.getElementById('progressDots');
  dots.innerHTML = s.steps.map((_,i) => {
    let cls = i < currentStep ? 'done' : '';
    if (i === currentStep) cls = 'active';
    const style = i === currentStep ? `background:${c.color};width:24px` : i < currentStep ? `background:${c.color};opacity:.4` : '';
    return `<div class="dot ${cls}" style="${style}"></div>`;
  }).join('');

  // picture card
  const card = document.getElementById('pictureCard');
  card.style.background = c.bg;
  card.className = 'picture-card ' + (goingBack ? 'back-slide' : '');
  card.offsetHeight; // force reflow for animation replay
  card.className = 'picture-card ' + (goingBack ? 'back-slide' : '');

  document.getElementById('cardPicture').textContent = step.e;
  document.getElementById('cardText').textContent = step.t;

  // next button
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.background = c.color;
  const isLast = currentStep === total - 1;
  document.getElementById('nextLabel').textContent = isLast ? "I did it! 🎉" : "Next step";
  document.getElementById('nextArrow').textContent  = isLast ? "" : "→";

  // prev button
  document.getElementById('prevBtn').style.visibility = currentStep === 0 ? 'hidden' : 'visible';

  // stop any ongoing speech
  stopSpeech();
}

function nextStep() {
  if (currentStep < currentScenario.steps.length - 1) {
    currentStep++;
    renderStep(false);
  } else {
    showComplete();
  }
}

function prevStep() {
  if (currentStep > 0) { currentStep--; renderStep(true); }
}

// ── Read aloud ─────────────────────────────────────────────────────────────
function readAloud() {
  if (!('speechSynthesis' in window)) { return; }
  if (speaking) { stopSpeech(); return; }
  const text = currentScenario.steps[currentStep].t;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.88; utt.pitch = 1.1;
  const voices = speechSynthesis.getVoices();
  const friendly = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en'));
  if (friendly) utt.voice = friendly;
  utt.onstart = () => { speaking = true; document.getElementById('readAloudBtn').classList.add('speaking'); document.getElementById('readAloudBtn').querySelector('span').textContent = 'Stop reading'; };
  utt.onend   = () => { speaking = false; document.getElementById('readAloudBtn').classList.remove('speaking'); document.getElementById('readAloudBtn').querySelector('span').textContent = 'Read it to me'; };
  speechSynthesis.speak(utt);
}

function stopSpeech() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  speaking = false;
  const btn = document.getElementById('readAloudBtn');
  if (btn) { btn.classList.remove('speaking'); btn.querySelector('span').textContent = 'Read it to me'; }
}

// ══════════════════════════════════════════════════════════════════════════
//  COMPLETE
// ══════════════════════════════════════════════════════════════════════════
function showComplete() {
  stopSpeech();
  const c = CATS[currentScenario.cat];
  document.getElementById('completeActivity').textContent = currentScenario.title;
  document.getElementById('btnAgain').style.background = c.color;
  show('completeScreen');
  spawnConfetti(40);
  if (navigator.vibrate) navigator.vibrate([80,40,80,40,180]);
}

function tryAgain() { openScenario(currentScenario.id); }

function goHome() {
  stopSpeech();
  show('homeScreen');
}

// ══════════════════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function spawnConfetti(n) {
  const colors = ['#FF6B9D','#FFD166','#4ECBA0','#74B9FF','#A29BFE','#FF9A5C','#FF6B6B'];
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div'); el.className = 'confetti';
    const s = 7 + Math.random() * 9;
    el.style.cssText = `left:${10+Math.random()*80}%;top:-16px;width:${s}px;height:${s}px;`
      + `background:${colors[~~(Math.random()*colors.length)]};`
      + `border-radius:${Math.random()>.5?'50%':'4px'};`
      + `animation-delay:${Math.random()*.5}s;animation-duration:${1+Math.random()*.8}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// init
initHome();
speechSynthesis.onvoiceschanged = () => {}; // warm up voices
</script>
