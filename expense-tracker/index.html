<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Spend — Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --card:#141420;
  --card2:#1c1c2e;
  --border:rgba(255,255,255,.06);
  --text:#f0f0f8;
  --muted:#5a5a78;
  --muted2:#8888aa;
  --accent:#7c6af7;
  --accent2:#5eead4;
  --red:#ff6b6b;
  --green:#4ade80;
  --orange:#fb923c;
  --yellow:#facc15;
  --blue:#60a5fa;
  --pink:#f472b6;
  --purple:#c084fc;
  --teal:#2dd4bf;
  --r:16px;
  --tab-h:72px;
}
html{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100%;}
body{min-height:100vh;min-height:-webkit-fill-available;background:var(--bg);overflow-x:hidden;}

/* ── TABS ── */
.tabs{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:rgba(14,14,22,.92);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;color:var(--muted);cursor:pointer;transition:color .2s;font-size:.68rem;font-weight:600;letter-spacing:.04em;padding-top:8px;}
.tab svg{transition:transform .2s;}
.tab.active{color:var(--accent);}
.tab.active svg{transform:scale(1.1);}

/* ── PAGES ── */
.page{display:none;min-height:calc(100vh - var(--tab-h));padding:0 0 calc(var(--tab-h) + 16px);}
.page.active{display:block;}

/* ── OVERVIEW ── */
.hero{background:linear-gradient(160deg,#1a1040 0%,#0d0d1a 100%);padding:56px 20px 36px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(124,106,247,.25),transparent 70%);pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:-60px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(94,234,212,.15),transparent 70%);pointer-events:none;}
.hero-label{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
.hero-amount{font-size:3.2rem;font-weight:800;letter-spacing:-.03em;line-height:1;}
.hero-amount span{font-size:1.6rem;font-weight:400;vertical-align:super;margin-right:3px;}
.hero-sub{font-size:.85rem;color:var(--muted2);margin-top:8px;}
.hero-pills{display:flex;gap:10px;margin-top:24px;}
.hero-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:99px;padding:8px 16px;flex:1;}
.pill-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.pill-label{font-size:.7rem;color:var(--muted2);}
.pill-val{font-size:.9rem;font-weight:700;margin-top:1px;}
.income-pill .pill-icon{background:rgba(78,222,128,.12);}
.expense-pill .pill-icon{background:rgba(255,107,107,.12);}

.section-head{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 10px;}
.section-title{font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);}
.month-btn{display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;}

/* Category bars */
.cat-list{padding:0 20px;display:flex;flex-direction:column;gap:10px;}
.cat-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.cat-dot{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-name{font-size:.88rem;font-weight:600;}
.cat-count{font-size:.72rem;color:var(--muted2);margin-top:1px;}
.cat-bar-wrap{height:3px;background:var(--card2);border-radius:99px;overflow:hidden;margin-top:6px;}
.cat-bar{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.cat-amt{font-size:.9rem;font-weight:700;text-align:right;flex-shrink:0;}

/* Recent */
.txn-list{padding:0 20px;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.txn-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:background .15s;position:relative;}
.txn-row:active{background:var(--card2);}
.txn-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.txn-info{flex:1;min-width:0;}
.txn-desc{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txn-meta{font-size:.72rem;color:var(--muted2);margin-top:2px;}
.txn-amt{font-size:.95rem;font-weight:700;flex-shrink:0;}
.txn-del{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(255,107,107,.1);border:none;color:var(--red);width:28px;height:28px;border-radius:8px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:.85rem;}
.txn-row:hover .txn-del{display:flex;}

/* ── ADD PAGE ── */
.add-page{padding:52px 20px 100px;}
.add-title{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-bottom:28px;}

.type-row{display:flex;gap:8px;margin-bottom:24px;}
.type-pill{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--muted2);font-size:.88rem;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;}
.type-pill.active-expense{border-color:var(--red);background:rgba(255,107,107,.08);color:var(--red);}
.type-pill.active-income{border-color:var(--green);background:rgba(74,222,128,.08);color:var(--green);}

.amount-field{text-align:center;margin-bottom:28px;}
.amount-field input{font-size:3rem;font-weight:800;letter-spacing:-.04em;background:none;border:none;color:var(--text);text-align:center;width:100%;outline:none;}
.amount-field input::placeholder{color:var(--muted);}
.amount-divider{height:1px;background:var(--border);margin:0 auto;width:60%;}

.field-group{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.field-label{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px;}
.field-input{background:var(--card);border:1.5px solid var(--border);color:var(--text);padding:14px 16px;border-radius:14px;font-size:.95rem;font-family:inherit;outline:none;width:100%;transition:border-color .2s;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--muted);}
select.field-input option{background:var(--card2);}

.cat-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cat-pick{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;}
.cat-pick.selected{border-color:var(--accent);background:rgba(124,106,247,.1);}
.cat-pick-icon{font-size:1.4rem;}
.cat-pick-label{font-size:.65rem;font-weight:600;color:var(--muted2);text-align:center;}

.add-btn{width:100%;padding:17px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#5b50d6);color:#fff;border:none;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.01em;margin-top:8px;transition:opacity .2s,transform .1s;}
.add-btn:active{opacity:.85;transform:scale(.98);}

/* ── HISTORY ── */
.hist-page{padding:52px 20px 16px;}
.hist-title{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-bottom:20px;}
.hist-month{margin-bottom:20px;}
.hist-month-label{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;}
.empty{text-align:center;padding:60px 20px;color:var(--muted2);}
.empty-icon{font-size:3rem;display:block;margin-bottom:12px;}

/* ── MONTH MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;align-items:flex-end;}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-height:70vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px;}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;}
.month-option{padding:14px 16px;border-radius:12px;cursor:pointer;font-size:.9rem;font-weight:500;transition:background .15s;}
.month-option:hover{background:var(--card2);}
.month-option.selected{color:var(--accent);font-weight:700;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.page.active .cat-row,.page.active .txn-row{animation:fadeUp .3s ease both;}
</style>
</head>
<body>

<!-- PAGES -->
<div id="page-overview" class="page active">

  <div class="hero">
    <div class="hero-label" id="heroLabel">April 2026</div>
    <div class="hero-amount"><span>₹</span><span id="heroAmt">0</span></div>
    <div class="hero-sub" id="heroSub">total spent this month</div>
    <div class="hero-pills">
      <div class="hero-pill income-pill">
        <div class="pill-icon">↑</div>
        <div><div class="pill-label">Income</div><div class="pill-val" id="heroIncome">₹0</div></div>
      </div>
      <div class="hero-pill expense-pill">
        <div class="pill-icon">↓</div>
        <div><div class="pill-label">Spent</div><div class="pill-val" id="heroSpent">₹0</div></div>
      </div>
    </div>
  </div>

  <div class="section-head">
    <div class="section-title">By Category</div>
    <button class="month-btn" onclick="openMonthModal()">
      <span id="monthBtnLabel">Apr 2026</span> ▾
    </button>
  </div>
  <div class="cat-list" id="catList"></div>

  <div class="section-head"><div class="section-title">Recent</div></div>
  <div class="txn-list" id="recentList"></div>
</div>

<div id="page-add" class="page">
  <div class="add-page">
    <div class="add-title">New Entry</div>

    <div class="type-row">
      <button class="type-pill active-expense" id="typExp" onclick="setType('expense')">− Expense</button>
      <button class="type-pill" id="typInc" onclick="setType('income')">+ Income</button>
    </div>

    <div class="amount-field">
      <input id="amtInput" type="number" inputmode="decimal" placeholder="0.00"/>
      <div class="amount-divider"></div>
    </div>

    <div class="field-group">
      <div>
        <div class="field-label">Description</div>
        <input class="field-input" id="descInput" type="text" placeholder="e.g. Coffee at Starbucks"/>
      </div>
      <div>
        <div class="field-label">Date</div>
        <input class="field-input" id="dateInput" type="date"/>
      </div>
      <div id="catSection">
        <div class="field-label">Category</div>
        <div class="cat-picker" id="catPicker"></div>
      </div>
    </div>

    <button class="add-btn" onclick="addEntry()">Add Entry</button>
  </div>
</div>

<div id="page-history" class="page">
  <div class="hist-page">
    <div class="hist-title">History</div>
    <div id="histContent"></div>
  </div>
</div>

<!-- BOTTOM TABS -->
<nav class="tabs">
  <button class="tab active" id="tab-overview" onclick="switchTab('overview')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="9"/><path d="M11 6v5l3 3"/></svg>
    Overview
  </button>
  <button class="tab" id="tab-add" onclick="switchTab('add')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="9"/><line x1="11" y1="7" x2="11" y2="15"/><line x1="7" y1="11" x2="15" y2="11"/></svg>
    Add
  </button>
  <button class="tab" id="tab-history" onclick="switchTab('history')">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h10M4 18h7"/></svg>
    History
  </button>
</nav>

<!-- MONTH MODAL -->
<div class="modal-overlay" id="monthModal" onclick="closeMonthModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Select Month</div>
    <div id="monthList"></div>
  </div>
</div>

<script>
const CATS = [
  {id:'groceries',label:'Groceries',icon:'🛒',color:'#4ade80'},
  {id:'food',label:'Food',icon:'🍜',color:'#fb923c'},
  {id:'travel',label:'Travel',icon:'✈️',color:'#facc15'},
  {id:'transport',label:'Transport',icon:'🚗',color:'#60a5fa'},
  {id:'shopping',label:'Shopping',icon:'🛍️',color:'#f472b6'},
  {id:'health',label:'Health',icon:'❤️',color:'#ff6b6b'},
  {id:'bills',label:'Bills',icon:'📄',color:'#c084fc'},
  {id:'other',label:'Other',icon:'📦',color:'#94a3b8'},
];

let txns = JSON.parse(localStorage.getItem('sp_txns')||'[]');
let currentMonth = new Date().toISOString().slice(0,7);
let selectedCat = 'groceries';
let txnType = 'expense';

function save(){localStorage.setItem('sp_txns',JSON.stringify(txns));}
function fmt(n){return '₹'+Math.abs(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function monthLabel(ym){const[y,m]=ym.split('-');return new Date(y,m-1).toLocaleString('en-IN',{month:'long',year:'numeric'});}
function monthShort(ym){const[y,m]=ym.split('-');return new Date(y,m-1).toLocaleString('en-IN',{month:'short',year:'numeric'});}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('page-'+t).classList.add('active');
  if(t==='overview')renderOverview();
  if(t==='history')renderHistory();
}

function setType(t){
  txnType=t;
  document.getElementById('typExp').className='type-pill'+(t==='expense'?' active-expense':'');
  document.getElementById('typInc').className='type-pill'+(t==='income'?' active-income':'');
  document.getElementById('catSection').style.display=t==='income'?'none':'block';
}

function buildCatPicker(){
  const el=document.getElementById('catPicker');
  el.innerHTML=CATS.map(c=>`
    <div class="cat-pick${c.id===selectedCat?' selected':''}" onclick="selectCat('${c.id}')">
      <div class="cat-pick-icon">${c.icon}</div>
      <div class="cat-pick-label">${c.label}</div>
    </div>`).join('');
}
function selectCat(id){selectedCat=id;buildCatPicker();}

function addEntry(){
  const amt=parseFloat(document.getElementById('amtInput').value);
  const desc=document.getElementById('descInput').value.trim();
  const date=document.getElementById('dateInput').value;
  if(!amt||amt<=0||!desc||!date){alert('Fill in all fields.');return;}
  txns.push({id:Date.now(),type:txnType,amt,desc,cat:txnType==='income'?'income':selectedCat,date});
  save();
  document.getElementById('amtInput').value='';
  document.getElementById('descInput').value='';
  switchTab('overview');
}

function delTxn(id){txns=txns.filter(t=>t.id!==id);save();renderOverview();}

function monthTxns(){return txns.filter(t=>t.date.startsWith(currentMonth));}

function renderOverview(){
  const mt=monthTxns();
  const expenses=mt.filter(t=>t.type==='expense');
  const incomes=mt.filter(t=>t.type==='income');
  const totalSpent=expenses.reduce((s,t)=>s+t.amt,0);
  const totalIncome=incomes.reduce((s,t)=>s+t.amt,0);

  document.getElementById('heroLabel').textContent=monthLabel(currentMonth);
  document.getElementById('heroAmt').textContent=totalSpent.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('heroIncome').textContent=fmt(totalIncome);
  document.getElementById('heroSpent').textContent=fmt(totalSpent);
  document.getElementById('monthBtnLabel').textContent=monthShort(currentMonth);

  const maxCat=Math.max(...CATS.map(c=>expenses.filter(t=>t.cat===c.id).reduce((s,t)=>s+t.amt,0)),1);
  const catHTML=CATS.map(c=>{
    const amt=expenses.filter(t=>t.cat===c.id).reduce((s,t)=>s+t.amt,0);
    if(!amt)return '';
    const count=expenses.filter(t=>t.cat===c.id).length;
    const pct=(amt/maxCat*100).toFixed(0);
    return `<div class="cat-row">
      <div class="cat-dot" style="background:${c.color}22">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${c.label}</div>
        <div class="cat-count">${count} transaction${count!==1?'s':''}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${c.color}"></div></div>
      </div>
      <div class="cat-amt" style="color:${c.color}">${fmt(amt)}</div>
    </div>`;
  }).join('');
  document.getElementById('catList').innerHTML=catHTML||'<div class="empty"><span class="empty-icon">🪙</span>No expenses this month</div>';

  const recent=[...mt].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const recHTML=recent.map(t=>{
    const cat=CATS.find(c=>c.id===t.cat)||{icon:'💰',color:'#4ade80'};
    const d=new Date(t.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    return `<div class="txn-row">
      <div class="txn-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="txn-info">
        <div class="txn-desc">${t.desc}</div>
        <div class="txn-meta">${d} · ${cat.label||'Income'}</div>
      </div>
      <div class="txn-amt" style="color:${t.type==='income'?'#4ade80':'#ff6b6b'}">${t.type==='income'?'+':'−'}${fmt(t.amt)}</div>
      <button class="txn-del" onclick="event.stopPropagation();delTxn(${t.id})">✕</button>
    </div>`;
  }).join('');
  document.getElementById('recentList').innerHTML=recHTML||'';
}

function renderHistory(){
  const grouped={};
  [...txns].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
    const m=t.date.slice(0,7);
    if(!grouped[m])grouped[m]=[];
    grouped[m].push(t);
  });
  const months=Object.keys(grouped);
  if(!months.length){document.getElementById('histContent').innerHTML='<div class="empty"><span class="empty-icon">📭</span>No transactions yet</div>';return;}
  let html='';
  months.forEach(m=>{
    const list=grouped[m];
    html+=`<div class="hist-month"><div class="hist-month-label">${monthLabel(m)}</div>`;
    list.forEach(t=>{
      const cat=CATS.find(c=>c.id===t.cat)||{icon:'💰',color:'#4ade80'};
      const d=new Date(t.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
      html+=`<div class="txn-row" style="margin-bottom:8px">
        <div class="txn-icon" style="background:${cat.color}22">${cat.icon}</div>
        <div class="txn-info">
          <div class="txn-desc">${t.desc}</div>
          <div class="txn-meta">${d}</div>
        </div>
        <div class="txn-amt" style="color:${t.type==='income'?'#4ade80':'#ff6b6b'}">${t.type==='income'?'+':'−'}${fmt(t.amt)}</div>
        <button class="txn-del" onclick="event.stopPropagation();delTxn(${t.id});renderHistory()">✕</button>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('histContent').innerHTML=html;
}

function openMonthModal(){
  const allMonths=[...new Set(txns.map(t=>t.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a));
  const now=new Date().toISOString().slice(0,7);
  if(!allMonths.includes(now))allMonths.unshift(now);
  document.getElementById('monthList').innerHTML=allMonths.map(m=>`
    <div class="month-option${m===currentMonth?' selected':''}" onclick="setMonth('${m}')">
      ${monthLabel(m)}
    </div>`).join('');
  document.getElementById('monthModal').classList.add('open');
}
function closeMonthModal(){document.getElementById('monthModal').classList.remove('open');}
function setMonth(m){currentMonth=m;closeMonthModal();renderOverview();}

function init(){
  document.getElementById('dateInput').value=new Date().toISOString().slice(0,10);
  buildCatPicker();
  renderOverview();
}
init();
</script>
</body>
</html>
