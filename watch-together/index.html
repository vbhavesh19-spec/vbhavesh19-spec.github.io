{t:"Sherlock",y:2010,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:9.1,c:"Benedict Cumberbatch, Martin Freeman",id:"tt1475582",e:"🔍",d:"A consulting detective and his army doctor flatmate solve impossible cases in modern London. Cumberbatch and Freeman have the most electric screen partnership of their generation."},
{t:"True Detective",y:2014,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:9.0,c:"Matthew McConaughey, Woody Harrelson",id:"tt2356777",e:"🌾",d:"Two detectives investigate a ritualistic murder in Louisiana — connected across 17 years. Season 1 is the greatest single season of any crime drama ever made."},
{t:"Kota Factory",y:2019,k:"Series",g:["Comedy","Drama"],r:9.2,c:"Jitendra Kumar, Mayur More",id:"tt10016180",e:"📐",d:"A student arrives in Kota to prepare for IIT-JEE and navigates the pressure, loneliness, and unexpected friendships. Shot in black-and-white — every Indian student will recognize themselves."},
{t:"Panchayat",y:2020,k:"Series",g:["Comedy","Drama","Family"],r:9.0,c:"Jitendra Kumar, Raghubir Yadav",id:"tt11763622",e:"🌿",d:"An engineering graduate becomes panchayat secretary in a remote UP village and slowly finds himself at home. The most wholesome Indian series ever made."},
{t:"Better Call Saul",y:2015,k:"Series",g:["Crime","Drama","Thriller"],r:8.9,c:"Bob Odenkirk, Jonathan Banks, Rhea Seehorn",id:"tt3032476",e:"⚖️",d:"The transformation of Jimmy McGill into Saul Goodman. Many argue it surpasses Breaking Bad — Rhea Seehorn's Kim Wexler is one of the greatest TV characters ever written."},
{t:"Succession",y:2018,k:"Series",g:["Drama","Thriller"],r:8.9,c:"Brian Cox, Jeremy Strong, Sarah Snook",id:"tt7660850",e:"💰",d:"A media dynasty patriarch dangles his succession over his scheming children. The funniest tragedy on television — every character is monstrous and sympathetic."},
{t:"Fargo",y:2014,k:"Series",g:["Crime","Drama","Thriller"],r:8.9,c:"Martin Freeman, Billy Bob Thornton",id:"tt2802850",e:"❄️",d:"A meek insurance salesman's life is upended when a dangerous drifter arrives in small-town Minnesota. Noah Hawley makes the Coens' DNA his own — Billy Bob Thornton is ice-cold terrifying."},
{t:"Fleabag",y:2016,k:"Series",g:["Comedy","Drama","Romance"],r:8.7,c:"Phoebe Waller-Bridge, Andrew Scott",id:"tt5687612",e:"💥",d:"A chaotic, funny, deeply wounded woman breaks the fourth wall to share her messy life and an unexpected love for a priest. Only 12 episodes — watch it in one sitting."},
{t:"The Bear",y:2022,k:"Series",g:["Comedy","Drama"],r:8.6,c:"Jeremy Allen White, Ebon Moss-Bachrach",id:"tt14452776",e:"🍽️",d:"A fine-dining chef runs his family's Chicago sandwich shop after his brother's death. The most stressful and nourishing show on television."},
{t:"Peaky Blinders",y:2013,k:"Series",g:["Crime","Drama","Thriller","War"],r:8.8,c:"Cillian Murphy, Helen McCrory",id:"tt2442560",e:"🎩",d:"A gangster family in post-WWI Birmingham rises to national criminal power. Cillian Murphy as Tommy Shelby is one of the most compelling characters in TV history."},
{t:"The Crown",y:2016,k:"Series",g:["Biography","Drama","History"],r:8.7,c:"Claire Foy, Olivia Colman, Matt Smith",id:"tt4786824",e:"👑",d:"The reign of Queen Elizabeth II from her marriage to the present day. The most expensive series ever made at the time — and it earns every penny."},
{t:"Mindhunter",y:2017,k:"Series",g:["Crime","Drama","Thriller"],r:8.6,c:"Jonathan Groff, Holt McCallany, Anna Torv",id:"tt5290382",e:"🧠",d:"FBI agents in the late 70s begin interviewing convicted serial killers to understand and catch future ones. Fincher directs the early episodes — the most gripping procedural on Netflix."},
{t:"Stranger Things",y:2016,k:"Series",g:["Drama","Fantasy","Horror","Mystery","Sci-Fi","Thriller"],r:8.7,c:"Millie Bobby Brown, Finn Wolfhard",id:"tt4574334",e:"🔦",d:"When a boy disappears, his friends encounter a psychic girl and a gate to a terrifying alternate dimension. The ultimate 80s nostalgia trip wrapped in a genuinely scary story."},
{t:"Dark",y:2017,k:"Series",g:["Crime","Drama","Mystery","Sci-Fi","Thriller"],r:8.7,c:"Louis Hofmann, Oliver Masucci",id:"tt5753856",e:"🕳️",d:"A missing child sends a German town spiralling through time — a conspiracy spanning centuries. The most mind-bending show ever made. Keep a notebook."},
{t:"Ozark",y:2017,k:"Series",g:["Crime","Drama","Thriller"],r:8.4,c:"Jason Bateman, Laura Linney",id:"tt5071412",e:"💵",d:"A financial planner moves his family to the Ozarks to launder money for a drug cartel. Bateman directs and stars — think Breaking Bad but with a married couple doing it together."},
{t:"Narcos",y:2015,k:"Series",g:["Biography","Crime","Drama","Thriller"],r:8.8,c:"Pedro Pascal, Wagner Moura, Boyd Holbrook",id:"tt4507836",e:"🌿",d:"The rise and fall of Pablo Escobar and the DEA agents hunting him. Wagner Moura's Escobar is one of the most charismatic and terrifying characters in prestige TV."},
{t:"Westworld",y:2016,k:"Series",g:["Drama","Mystery","Sci-Fi","Thriller","Western"],r:8.9,c:"Evan Rachel Wood, Anthony Hopkins, Ed Harris",id:"tt0475784",e:"🤖",d:"Hosts in a Wild West theme park begin to achieve consciousness. Season 1 is the most ambitious, perfectly constructed sci-fi series since Lost — a puzzle that rewards deep attention."},
{t:"Black Mirror",y:2011,k:"Series",g:["Drama","Mystery","Sci-Fi","Thriller"],r:8.7,c:"Various",id:"tt2085059",e:"📱",d:"Standalone episodes exploring the dark side of technology and society. No other anthology show has made audiences as anxious — or more thoughtful — about the future."},
{t:"Severance",y:2022,k:"Series",g:["Drama","Mystery","Sci-Fi","Thriller"],r:8.7,c:"Adam Scott, Patricia Arquette, John Turturro",id:"tt11280740",e:"🪪",d:"Employees undergo a procedure to surgically divide their work and personal memories. Apple TV+'s most acclaimed show — a slow-burn metaphor for work-life balance that becomes genuinely terrifying."},
{t:"Ted Lasso",y:2020,k:"Series",g:["Comedy","Drama","Sport"],r:8.8,c:"Jason Sudeikis, Hannah Waddingham, Brett Goldstein",id:"tt10986410",e:"🍪",d:"An optimistic American college football coach is hired to manage an English Premier League club despite knowing nothing about soccer. The kindest, most surprising comedy on television."},
{t:"Schitt's Creek",y:2015,k:"Series",g:["Comedy","Drama"],r:8.5,c:"Eugene Levy, Catherine O'Hara, Dan Levy",id:"tt3526078",e:"💐",d:"A wealthy family loses everything and must relocate to a small town they once bought as a joke. A show that starts as satire and slowly reveals itself to be one of TV's great love stories."},
{t:"The Office (US)",y:2005,k:"Series",g:["Comedy"],r:9.0,c:"Steve Carell, John Krasinski",id:"tt0386676",e:"📎",d:"A documentary crew follows the deluded manager of a Scranton paper company. The greatest workplace comedy ever made — gets more emotional with every rewatch."},
{t:"Friends",y:1994,k:"Series",g:["Comedy","Romance"],r:8.9,c:"Jennifer Aniston, Courteney Cox, Lisa Kudrow",id:"tt0108778",e:"☕",d:"Six friends in New York navigate love and careers over a decade. The most rewatched sitcom in history — you can start at any episode and feel at home."},
{t:"Parks and Recreation",y:2009,k:"Series",g:["Comedy"],r:8.6,c:"Amy Poehler, Nick Offerman, Aziz Ansari",id:"tt1266020",e:"🌳",d:"A deeply enthusiastic parks department employee tries to build a community park in a small Indiana town. The most purely joyful comedy on television — Leslie Knope is a hero for our times."},
{t:"Brooklyn Nine-Nine",y:2013,k:"Series",g:["Comedy","Crime"],r:8.4,c:"Andy Samberg, Andre Braugher",id:"tt2467372",e:"🚓",d:"A hilarious and immature detective and his no-nonsense boss work at a Brooklyn precinct. The most consistently funny network comedy of its decade — and secretly the most progressive."},
{t:"How I Met Your Mother",y:2005,k:"Series",g:["Comedy","Romance"],r:8.3,c:"Josh Radnor, Neil Patrick Harris, Cobie Smulders",id:"tt0460649",e:"🍻",d:"A man tells his children the incredibly long story of how he met their mother. The most structurally inventive network sitcom ever made — the journey is the destination."},
{t:"Game of Thrones",y:2011,k:"Series",g:["Action","Adventure","Drama","Fantasy","Thriller","War"],r:9.2,c:"Emilia Clarke, Kit Harington, Peter Dinklage",id:"tt0944947",e:"🐲",d:"Noble families wage war for the Iron Throne while an ancient evil stirs. The most epic fantasy series ever made — the first six seasons are some of the best television ever produced."},
{t:"Shogun",y:2024,k:"Series",g:["Action","Adventure","Drama","History","Romance","War"],r:8.6,c:"Hiroyuki Sanada, Cosmo Jarvis, Anna Sawai",id:"tt2788316",e:"⛩️",d:"An English navigator becomes embroiled in feudal Japan's war for power after being shipwrecked. Swept the Emmys — 2024's most acclaimed new show."},
{t:"The Last of Us",y:2023,k:"Series",g:["Action","Adventure","Drama","Horror","Sci-Fi","Thriller"],r:8.8,c:"Pedro Pascal, Bella Ramsey",id:"tt3581920",e:"🍄",d:"A hardened smuggler escorts humanity's last hope across a post-apocalyptic America. Episode 3 is a standalone masterpiece. The most devastating game adaptation ever made."},
{t:"Squid Game",y:2021,k:"Series",g:["Action","Drama","Mystery","Thriller"],r:8.0,c:"Lee Jung-jae, Park Hae-soo",id:"tt10919420",e:"🟩",d:"Hundreds of desperate people compete in deadly children's games for a massive prize. Sharp social satire wrapped in visceral tension — the show that kept the world up at night."},
{t:"House of the Dragon",y:2022,k:"Series",g:["Action","Adventure","Drama","Fantasy"],r:8.4,c:"Matt Smith, Paddy Considine, Emma D'Arcy",id:"tt11198330",e:"🔥",d:"The Targaryen civil war, two centuries before Game of Thrones. A more focused, character-driven epic than its parent show — and the dragons are better."},
{t:"Mirzapur",y:2018,k:"Series",g:["Action","Crime","Drama","Thriller"],r:8.5,c:"Pankaj Tripathi, Ali Fazal",id:"tt8080204",e:"🔫",d:"Two brothers from UP get pulled into the brutal world of the region's most powerful crime lord. Pankaj Tripathi's Kaleen Bhaiya is one of Indian TV's most chilling villains."},
{t:"Sacred Games",y:2018,k:"Series",g:["Action","Crime","Drama","Mystery","Thriller"],r:8.6,c:"Nawazuddin Siddiqui, Saif Ali Khan",id:"tt5823234",e:"💀",d:"A Mumbai cop receives a call from a gangster offering to save the city — with 25 days to act. India's first and still most ambitious Netflix original."},
{t:"Paatal Lok",y:2020,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:8.1,c:"Jaideep Ahlawat, Neeraj Kabi",id:"tt10370834",e:"🌑",d:"A lowly inspector investigating an assassination attempt uncovers a web that reaches from the gutter to the highest levels of power. Jaideep Ahlawat is a revelation."},
{t:"Family Man",y:2019,k:"Series",g:["Action","Crime","Drama","Thriller"],r:8.7,c:"Manoj Bajpayee, Samantha Ruth Prabhu",id:"tt9174558",e:"🕵️",d:"A middle-class intelligence officer tries to protect the nation while struggling to be a good husband and father. Manoj Bajpayee is the finest screen actor in India right now."},
{t:"Delhi Crime",y:2019,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:8.5,c:"Shefali Shah, Rasika Dugal",id:"tt9692804",e:"👮",d:"Based on the 2012 Delhi gang rape case, this follows the police investigation in the days after. Shefali Shah's Vartika Chaturvedi is an extraordinary portrait of leadership under pressure."},
{t:"Money Heist",y:2017,k:"Series",g:["Action","Crime","Drama","Mystery","Thriller"],r:8.2,c:"Álvaro Morte, Úrsula Corberó",id:"tt6468322",e:"🔴",d:"A mastermind recruits a crew to hold the Spanish Mint hostage in the most ambitious heist in history. The most-watched non-English series on Netflix."},
{t:"Sex Education",y:2019,k:"Series",g:["Comedy","Drama","Romance"],r:8.3,c:"Asa Butterfield, Gillian Anderson, Ncuti Gatwa",id:"tt7767422",e:"🏫",d:"A teenager whose mum is a sex therapist sets up an underground advice clinic at school. Funny, inclusive, and genuinely thoughtful about teenagers and identity."},
{t:"Wednesday",y:2022,k:"Series",g:["Comedy","Crime","Fantasy","Horror","Mystery","Thriller"],r:8.1,c:"Jenna Ortega, Gwendoline Christie",id:"tt13443470",e:"🖤",d:"Wednesday Addams solves a murder mystery at her supernatural boarding school. Jenna Ortega completely owns the role — her solo dance scene is pure character expression."},
{t:"Crash Landing on You",y:2019,k:"Series",g:["Drama","Romance"],r:8.7,c:"Hyun Bin, Son Ye-jin",id:"tt10799642",e:"🪂",d:"A South Korean heiress accidentally lands in North Korea and falls in love with a military officer. The most globally beloved K-drama ever made — genuinely funny and deeply romantic."},
{t:"The Mandalorian",y:2019,k:"Series",g:["Action","Adventure","Sci-Fi"],r:8.7,c:"Pedro Pascal, Giancarlo Esposito",id:"tt8111088",e:"⚔️",d:"A lone bounty hunter in the outer reaches of the galaxy discovers a mysterious child he must protect. The best thing to happen to Star Wars since The Empire Strikes Back — and Baby Yoda is real."},
{t:"Andor",y:2022,k:"Series",g:["Action","Adventure","Drama","Sci-Fi"],r:8.4,c:"Diego Luna, Stellan Skarsgård, Faye Marsay",id:"tt9253284",e:"⭐",d:"The years before Rogue One — how a petty criminal slowly becomes a revolutionary. The most adult, morally complex Star Wars content ever made. Tony Gilroy reinvented prestige TV in space."},
{t:"The Boys",y:2019,k:"Series",g:["Action","Comedy","Crime","Drama","Sci-Fi"],r:8.7,c:"Karl Urban, Jack Quaid, Antony Starr",id:"tt1190634",e:"💥",d:"A group of vigilantes fights back against superheroes who abuse their powers. The most savage satire of corporate culture and celebrity since Network — Antony Starr's Homelander is genuinely frightening."},

/* ── International Cinema ── */
{t:"Amélie",y:2001,k:"Movie",g:["Comedy","Romance"],r:8.3,c:"Audrey Tautou, Mathieu Kassovitz",id:"tt0211915",e:"🌿",d:"A shy Montmartre waitress decides to improve the lives of everyone around her while pursuing her own love story. Jean-Pierre Jeunet's most enchanting film — Paris never looked this magical."},
{t:"The Intouchables",y:2011,k:"Movie",g:["Biography","Comedy","Drama"],r:8.5,c:"François Cluzet, Omar Sy",id:"tt1675434",e:"🖐️",d:"A paralyzed French aristocrat hires a young man from the projects as his carer — and they become unlikely friends. The best-performing French film in history. Omar Sy is a force of nature."},
{t:"Cinema Paradiso",y:1988,k:"Movie",g:["Drama","Romance"],r:8.5,c:"Philippe Noiret, Salvatore Cascio",id:"tt0095765",e:"🎞️",d:"A famous director looks back on his childhood in a Sicilian village and the projectionist who was like a father to him. The most nostalgic and tender love letter to cinema ever made."},
{t:"The Lives of Others",y:2006,k:"Movie",g:["Drama","Mystery","Thriller"],r:8.4,c:"Ulrich Mühe, Martina Gedeck",id:"tt0405094",e:"🎧",d:"A Stasi officer surveilling a playwright in East Berlin begins to be moved by what he hears. The greatest German film of the 21st century — quietly devastating."},
{t:"A Separation",y:2011,k:"Movie",g:["Drama"],r:8.3,c:"Peyman Moaadi, Leila Hatami",id:"tt1832382",e:"⚖️",d:"An Iranian couple's decision to separate sets off an avalanche of consequences for two families. Asghar Farhadi's Best Foreign Film winner is a masterclass in moral complexity — nobody is simply right or wrong."},
{t:"Capernaum",y:2018,k:"Movie",g:["Drama"],r:8.4,c:"Zain Al Rafeea, Yordanos Shiferaw",id:"tt8267604",e:"🧒",d:"A 12-year-old Lebanese boy sues his parents for bringing him into a life of poverty and neglect. Nadine Labaki's film is gut-wrenching and alive — Zain Al Rafeea's performance is extraordinary."},
{t:"The Handmaiden",y:2016,k:"Movie",g:["Drama","Mystery","Romance","Thriller"],r:8.1,c:"Kim Min-hee, Kim Tae-ri",id:"tt4016934",e:"✂️",d:"A pickpocket is hired to be a Japanese heiress's maid as part of a con — but nothing is what it seems. Park Chan-wook's most sensuous and twisty film. Watch it without knowing anything."},
{t:"I Saw the Devil",y:2010,k:"Movie",g:["Action","Crime","Thriller"],r:7.8,c:"Lee Byung-hun, Choi Min-sik",id:"tt1548906",e:"😈",d:"A special agent hunts and tortures his fiancée's serial killer — but the line between hunter and monster dissolves. Kim Jee-woon's most extreme and morally complex film."},
{t:"Burning",y:2018,k:"Movie",g:["Drama","Mystery","Thriller"],r:7.5,c:"Yoo Ah-in, Steven Yeun, Jeon Jong-seo",id:"tt7282468",e:"🔥",d:"A young man becomes obsessed with a mysterious woman and her enigmatic new friend. Lee Chang-dong's slow, hypnotic thriller never reveals its hand — it stays with you for days."},
{t:"Bicycle Thieves",y:1948,k:"Movie",g:["Drama"],r:8.3,c:"Lamberto Maggiorani, Enzo Staiola",id:"tt0040522",e:"🚲",d:"A poor man's bicycle — his only means of work — is stolen in post-war Rome, and he searches for it with his young son. De Sica's Italian neo-realist masterpiece. The ending is perfect."},
{t:"Wild Strawberries",y:1957,k:"Movie",g:["Drama","Romance"],r:8.1,c:"Victor Sjöström, Bibi Andersson",id:"tt0050986",e:"🍓",d:"An elderly professor on a road trip to receive an honorary degree revisits memories and dreams from his life. Bergman's most accessible film — tender where his others are austere."},
{t:"Stalker",y:1979,k:"Movie",g:["Drama","Sci-Fi"],r:8.1,c:"Aleksandr Kaydanovskiy, Anatoliy Solonitsyn",id:"tt0079944",e:"🌿",d:"A guide leads a writer and a professor into a mysterious forbidden zone where one's deepest wish is supposedly granted. Tarkovsky's most meditative film — a journey into the human soul."},
{t:"Wings of Desire",y:1987,k:"Movie",g:["Drama","Fantasy","Romance"],r:8.1,c:"Bruno Ganz, Solveig Dommartin",id:"tt0093191",e:"😇",d:"An angel watches over Berlin and falls in love with a mortal trapeze artist. Wim Wenders' most beautiful film — Bruno Ganz makes you believe in angels."},

/* ── More Bollywood ── */
{t:"Sholay",y:1975,k:"Movie",g:["Action","Adventure","Comedy","Crime","Drama","Western"],r:8.2,c:"Dharmendra, Amitabh Bachchan, Hema Malini",id:"tt0073545",e:"🔥",d:"Two petty criminals are hired by a retired police officer to catch a ruthless dacoit. The greatest Hindi film ever made — 50 years later, Jai and Veeru still define Bollywood friendship."},
{t:"Mughal-e-Azam",y:1960,k:"Movie",g:["Drama","History","Music","Romance","War"],r:8.2,c:"Dilip Kumar, Madhubala, Prithviraj Kapoor",id:"tt0054055",e:"👑",d:"The Mughal emperor Akbar wages war against his own son Prince Salim over the slave girl Anarkali. The most expensive Indian film of its era — still magnificent 65 years later."},
{t:"Anand",y:1971,k:"Movie",g:["Drama"],r:8.2,c:"Rajesh Khanna, Amitabh Bachchan",id:"tt0131325",e:"😊",d:"A terminally ill man lives every day with infectious joy, leaving his mark on the doctor trying to save him. Rajesh Khanna's finest performance — Zindagi badi honi chahiye, lambi nahi."},
{t:"Gangs of Wasseypur",y:2012,k:"Movie",g:["Action","Crime","Drama","Thriller"],r:8.2,c:"Manoj Bajpayee, Nawazuddin Siddiqui, Richa Chadha",id:"tt1954470",e:"💀",d:"A multi-generational blood feud in the coal mines of Dhanbad spanning five decades. Anurag Kashyap's five-hour opus is the most ambitious Indian crime saga ever filmed."},
{t:"Barfi!",y:2012,k:"Movie",g:["Comedy","Drama","Romance"],r:8.1,c:"Ranbir Kapoor, Priyanka Chopra, Ileana D'Cruz",id:"tt2188109",e:"🎩",d:"A deaf-mute man and an autistic woman navigate love and friendship in 1970s Darjeeling. Anurag Basu's most charming film — Ranbir Kapoor has never been better."},
{t:"Piku",y:2015,k:"Movie",g:["Comedy","Drama"],r:8.0,c:"Amitabh Bachchan, Deepika Padukone, Irrfan Khan",id:"tt3863552",e:"🚗",d:"A strong-willed architect road-trips from Delhi to Kolkata with her hypochondriac father. The best-written adult comedy Bollywood has produced in years — Irrfan Khan is irreplaceable."},
{t:"Bajrangi Bhaijaan",y:2015,k:"Movie",g:["Action","Adventure","Comedy","Drama"],r:8.0,c:"Salman Khan, Harshaali Malhotra, Kareena Kapoor",id:"tt3863052",e:"🐒",d:"A devoted Hanuman bhakt tries to reunite a mute Pakistani girl with her family. The film that made Salman Khan's career meaningful — the India-Pakistan border crossing is unforgettable."},
{t:"Neerja",y:2016,k:"Movie",g:["Biography","Crime","Drama","Thriller"],r:7.8,c:"Sonam Kapoor, Shabana Azmi",id:"tt4655162",e:"✈️",d:"The true story of 23-year-old Neerja Bhanot, who saved 360 passengers during a hijacking at the cost of her own life. Sonam Kapoor's most powerful performance."},
{t:"Raazi",y:2018,k:"Movie",g:["Drama","Thriller"],r:7.9,c:"Alia Bhatt, Vicky Kaushal",id:"tt7763000",e:"🕵️",d:"An Indian girl married into a Pakistani military family to spy for RAW in 1971. Alia Bhatt's most restrained and devastating performance — the final scene is extraordinary."},
{t:"Chhichhore",y:2019,k:"Movie",g:["Comedy","Drama"],r:8.3,c:"Sushant Singh Rajput, Shraddha Kapoor",id:"tt9078020",e:"🏆",d:"A father tells his hospitalized son the story of his college 'loser squad' to teach him that failure is not the end. Nitesh Tiwari's most emotionally complete film — the finale will make you call your friends."},
{t:"Section 375",y:2019,k:"Movie",g:["Crime","Drama","Thriller"],r:8.1,c:"Akshaye Khanna, Richa Chadha",id:"tt9234618",e:"⚖️",d:"A hotshot defence lawyer and a public prosecutor argue opposite sides of a rape case. A taut, intelligent legal thriller about law, truth, and what a courtroom is actually for."},
{t:"Thappad",y:2020,k:"Movie",g:["Drama"],r:7.9,c:"Taapsee Pannu, Pavail Gulati",id:"tt10892428",e:"✋",d:"A woman seeks divorce after her husband slaps her at a party — just once. Anubhav Sinha's most quiet and devastating film about the everyday violence of 'acceptable' behaviour."},
{t:"83",y:2021,k:"Movie",g:["Biography","Drama","Sport"],r:7.9,c:"Ranveer Singh, Deepika Padukone",id:"tt11616332",e:"🏏",d:"India's greatest sporting upset — the 1983 Cricket World Cup victory against all odds under Kapil Dev. Ranveer Singh is fully transformed. Every Indian will tear up at the final over."},
{t:"Laapataa Ladies",y:2024,k:"Movie",g:["Comedy","Drama"],r:7.9,c:"Nitanshi Goel, Pratibha Ranta, Sparsh Shrivastava",id:"tt19915908",e:"🧕",d:"Two brides get mixed up on a train and their husbands search desperately for the right wife. Kiran Rao's gentle, sharp comedy about rural women discovering themselves."},
{t:"Mard Ko Dard Nahi Hota",y:2018,k:"Movie",g:["Action","Comedy","Drama"],r:8.2,c:"Abhimanyu Dassani, Radhika Madan",id:"tt7687304",e:"🥋",d:"A boy born without the ability to feel pain grows up to be a martial arts hero. One of the most original Indian action comedies ever — the action choreography is genuinely spectacular."},
{t:"Kapoor & Sons",y:2016,k:"Movie",g:["Drama"],r:7.7,c:"Fawad Khan, Sidharth Malhotra, Alia Bhatt",id:"tt4637328",e:"👨‍👩‍👦",d:"Two estranged brothers return home to their ailing grandfather and old fractures resurface. The most honest Indian family drama in years — and Rishi Kapoor is extraordinary."},
{t:"Rockstar",y:2011,k:"Movie",g:["Drama","Music","Romance"],r:7.7,c:"Ranbir Kapoor, Nargis Fakhri",id:"tt2071013",e:"🎸",d:"A Delhi boy transforms his heartbreak into artistic genius and becomes a rock legend. A.R. Rahman's score is perhaps his greatest since Dil Se — Ranbir Kapoor's most raw performance."},
{t:"Dil Dhadakne Do",y:2015,k:"Movie",g:["Comedy","Drama"],r:7.3,c:"Priyanka Chopra, Ranveer Singh, Anil Kapoor",id:"tt3104754",e:"🛳️",d:"A wealthy dysfunctional family's truths surface during a Mediterranean cruise. Zoya Akhtar's sharpest examination of privilege, gender, and what families perform for the world."},

/* ── More Series ── */
{t:"Band of Brothers",y:2001,k:"Series",g:["Drama","History","War"],r:9.4,c:"Damian Lewis, Ron Livingston, Tom Hanks",id:"tt0185906",e:"🎖️",d:"Easy Company of the 506th Parachute Infantry Regiment, from D-Day to the end of WWII. The most immersive war series ever made — every episode directed by someone different, every one excellent."},
{t:"The Queen's Gambit",y:2020,k:"Series",g:["Drama"],r:8.6,c:"Anya Taylor-Joy, Thomas Brodie-Sangster",id:"tt10048342",e:"♟️",d:"An orphaned chess prodigy battles addiction and isolation on her way to the top of the Cold War chess world. Anya Taylor-Joy commands every frame — the limited series of the decade."},
{t:"Arcane",y:2021,k:"Series",g:["Animation","Action","Adventure","Drama","Fantasy","Sci-Fi"],r:9.0,c:"Hailee Steinfeld, Ella Purnell (voices)",id:"tt11126994",e:"⚡",d:"Two sisters on opposite sides of a class conflict in a steampunk city. The best video game adaptation ever made — and arguably the best animated series of the 21st century."},
{t:"Mr. Robot",y:2015,k:"Series",g:["Crime","Drama","Sci-Fi","Thriller"],r:8.5,c:"Rami Malek, Christian Slater, Carly Chaikin",id:"tt4158110",e:"💻",d:"A cybersecurity engineer with social anxiety is recruited by an underground hacker group to destroy corporate debt. The most technically accurate hacking show ever made — and genuinely mind-bending."},
{t:"Yellowstone",y:2018,k:"Series",g:["Crime","Drama","Mystery","Thriller","Western"],r:8.7,c:"Kevin Costner, Luke Grimes, Kelly Reilly",id:"tt4236770",e:"🐴",d:"A family of ranchers fight for their land against developers, government, and a Native American reservation. Kelly Reilly's Beth Dutton is one of the great characters in American TV."},
{t:"Mad Men",y:2007,k:"Series",g:["Drama"],r:8.6,c:"Jon Hamm, Elisabeth Moss, January Jones",id:"tt0804503",e:"🥃",d:"The golden age of advertising in 1960s New York, centred on the enigmatic, self-invented Don Draper. Matthew Weiner's study of ambition, identity, and the emptiness of success."},
{t:"Twin Peaks",y:1990,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:8.8,c:"Kyle MacLachlan, Sheryl Lee",id:"tt0098936",e:"🌲",d:"FBI Agent Dale Cooper investigates the murder of a homecoming queen in a Pacific Northwest logging town. Lynch's greatest work for television — and still the strangest, most original show ever made."},
{t:"The Americans",y:2013,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:8.4,c:"Keri Russell, Matthew Rhys",id:"tt2149175",e:"🕵️",d:"Two KGB agents posing as a married couple in 1980s Washington DC. The most underrated prestige drama of its era — the marriage at the centre is one of TV's most complex relationships."},
{t:"Hannibal",y:2013,k:"Series",g:["Crime","Drama","Horror","Mystery","Thriller"],r:8.5,c:"Hugh Dancy, Mads Mikkelsen",id:"tt2243973",e:"🍽️",d:"FBI profiler Will Graham hunts serial killers with the help of psychiatrist Hannibal Lecter. Bryan Fuller's most visually extravagant series — Mads Mikkelsen's Lecter is the definitive version."},
{t:"Barry",y:2018,k:"Series",g:["Action","Comedy","Crime","Drama","Thriller"],r:8.4,c:"Bill Hader, Henry Winkler",id:"tt5765882",e:"🎭",d:"A hitman tries to leave his profession behind to become an actor in LA. Bill Hader's most personal work — simultaneously the funniest and most violent show on television."},
{t:"Big Little Lies",y:2017,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:8.4,c:"Reese Witherspoon, Nicole Kidman, Shailene Woodley",id:"tt3920596",e:"🌊",d:"Three women in a Monterey beach community are connected to a murder. Jean-Marc Vallée and HBO at their most stylish — Kidman's performance is the best of her career."},
{t:"The Handmaid's Tale",y:2017,k:"Series",g:["Drama","Sci-Fi","Thriller"],r:8.4,c:"Elisabeth Moss, Joseph Fiennes, Yvonne Strahovski",id:"tt5834204",e:"🔴",d:"A totalitarian Christian theocracy enslaves fertile women as 'handmaids' for breeding. Elisabeth Moss is riveting — and the world-building is terrifyingly plausible."},
{t:"Atlanta",y:2016,k:"Series",g:["Comedy","Drama"],r:8.5,c:"Donald Glover, Brian Tyree Henry, LaKeith Stanfield",id:"tt4288182",e:"🎵",d:"An Ivy League dropout manages his cousin's rap career in Atlanta. Donald Glover's most personal work — formally inventive, funny, and quietly radical. Season 2 is perfection."},
{t:"Killing Eve",y:2018,k:"Series",g:["Action","Crime","Drama","Mystery","Thriller"],r:8.2,c:"Sandra Oh, Jodie Comer",id:"tt7016936",e:"🗡️",d:"A security officer becomes obsessed with tracking down a psychopathic assassin — who becomes equally obsessed with her. Jodie Comer's Villanelle is one of the great TV creations of the decade."},
{t:"White Lotus",y:2021,k:"Series",g:["Comedy","Drama","Mystery","Thriller"],r:7.9,c:"Murray Bartlett, Jennifer Coolidge, Alexandra Daddario",id:"tt13274445",e:"🌺",d:"Guests and staff at a Hawaiian resort over one week — a comedy of privilege that turns darkly sharp. Mike White's most wicked writing. Season 2 in Sicily is even better."},
{t:"Beef",y:2023,k:"Series",g:["Comedy","Crime","Drama"],r:8.4,c:"Steven Yeun, Ali Wong",id:"tt14403178",e:"🚗",d:"A minor road-rage incident between two strangers spirals into all-consuming obsession. Lee Sung Jin's most unhinged creation — and somehow, in its final episode, the most moving thing on Netflix."},
{t:"Baby Reindeer",y:2024,k:"Series",g:["Crime","Drama","Thriller"],r:8.2,c:"Richard Gadd, Jessica Gunning",id:"tt17260210",e:"🦌",d:"A struggling comedian is stalked by a woman who becomes obsessed with him — while hiding his own past trauma. Richard Gadd wrote, stars in, and based this on his own life. Absolutely harrowing."},
{t:"Ripley",y:2024,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:8.2,c:"Andrew Scott, Johnny Flynn",id:"tt13966962",e:"🖼️",d:"Tom Ripley cons, steals, and kills his way through 1960s Italy. Shot entirely in black and white — Andrew Scott's most chilling performance, and some of the most beautiful television ever made."},
{t:"Fallout",y:2024,k:"Series",g:["Action","Adventure","Comedy","Drama","Sci-Fi"],r:8.5,c:"Ella Purnell, Walton Goggins, Aaron Moten",id:"tt12637874",e:"☢️",d:"A vault dweller ventures into the post-nuclear wasteland of Los Angeles. Amazon's most confident genre swing — genuinely funny, genuinely brutal, and the best video game adaptation on TV."},
{t:"Rocket Boys",y:2022,k:"Series",g:["Biography","Drama","History"],r:9.0,c:"Jim Sarbh, Ishwak Singh",id:"tt14491744",e:"🚀",d:"The parallel journeys of Homi Bhabha and Vikram Sarabhai building India's nuclear and space programmes. Jim Sarbh's Bhabha is a towering performance — India's finest historical series."},
{t:"Bandish Bandits",y:2020,k:"Series",g:["Drama","Music","Romance"],r:8.6,c:"Ritwik Bhowmik, Shreya Chaudhry",id:"tt12168776",e:"🎵",d:"A classical musician and a pop star fall in love while their musical worlds collide in Jodhpur. The most joyful Indian series about music — the performances are incredible."},
{t:"Yeh Meri Family",y:2018,k:"Series",g:["Comedy","Drama","Family"],r:9.1,c:"Mona Singh, Akarsh Khurana",id:"tt9173192",e:"📺",d:"A middle-class family in 1990s Jaipur, seen through the eyes of the youngest kid. TVF's most nostalgic series — every Indian who grew up in the 90s will recognize every frame."},
{t:"Flames",y:2018,k:"Series",g:["Comedy","Drama","Romance"],r:8.9,c:"Ritvik Sahore, Tanya Maniktala",id:"tt8703948",e:"❤️",d:"Two Delhi school kids with a complicated relationship navigate class 10 boards and first love. TVF's most tender and accurate portrait of adolescence — the chemistry is completely real."},
{t:"Downton Abbey",y:2010,k:"Series",g:["Drama","History","Romance"],r:8.7,c:"Hugh Bonneville, Maggie Smith, Michelle Dockery",id:"tt1606375",e:"🏰",d:"An aristocratic English family and their servants navigate the early 20th century. Maggie Smith's Dowager Countess alone is worth the entire series — witty, warm, and endlessly rewatchable."},
{t:"Lost",y:2004,k:"Series",g:["Adventure","Drama","Fantasy","Mystery","Sci-Fi","Thriller"],r:8.3,c:"Matthew Fox, Evangeline Lilly, Terry O'Quinn",id:"tt0411008",e:"✈️",d:"Survivors of a plane crash are stranded on a mysterious island with supernatural secrets. The most audacious and bingeworthy show of the 2000s — the journey is extraordinary, even if the destination divides."},
{t:"House of Cards (US)",y:2013,k:"Series",g:["Drama"],r:8.7,c:"Kevin Spacey, Robin Wright",id:"tt1856010",e:"🃏",d:"A ruthless congressman and his equally cunning wife scheme their way to the presidency. The show that launched Netflix's prestige era — Frank Underwood breaking the fourth wall is still thrilling."},
{t:"Dexter",y:2006,k:"Series",g:["Crime","Drama","Mystery","Thriller"],r:8.6,c:"Michael C. Hall, Jennifer Carpenter",id:"tt0773262",e:"🩸",d:"A Miami blood-spatter analyst moonlights as a vigilante serial killer targeting murderers. Michael C. Hall's most precise, committed performance — seasons 1–4 are some of the best TV ever made."},
{t:"Pachinko",y:2022,k:"Series",g:["Drama","History","Romance"],r:8.5,c:"Yuh-Jung Youn, Lee Min-ho, Minha Kim",id:"tt2776878",e:"🌸",d:"Four generations of a Korean family from Japanese colonial rule to 1980s Osaka. Apple TV+'s most ambitious series — intercutting time periods, languages, and decades with stunning confidence."},
];

  "Laugh-out-loud Funny":["Comedy"],
  "Mind-bending":["Sci-Fi","Mystery","Thriller"],
  "Action-pumped":["Action","Adventure"],
};

/* ════════════════════════════════════════════════════
   RECOMMENDATION ENGINE
════════════════════════════════════════════════════ */
function localRecs(persons){
  const w={};
  persons.forEach(p=>{
    (MOOD_G[p.mood]||[]).forEach(g=>w[g]=(w[g]||0)+2);
    if(p.genre){
      const m={"Biographical":"Biography","Musical":"Music","Sci-Fi":"Sci-Fi","Historical":"History","Superhero":"Action"}[p.genre]||p.genre;
      w[m]=(w[m]||0)+3;
    }
  });
  const yf=persons.map(p=>+p.yearFrom).filter(Boolean);
  const yt=persons.map(p=>+p.yearTo).filter(Boolean);
  const yFrom=yf.length?Math.min(...yf):1950, yTo=yt.length?Math.max(...yt):2025;
  const tp=persons.map(p=>p.type).filter(Boolean);
  const wM=!tp.length||tp.some(t=>t==="Movie"||t==="Either");
  const wS=!tp.length||tp.some(t=>t==="Series"||t==="Either");
  const actors=persons.map(p=>p.actor).filter(Boolean).map(a=>a.toLowerCase());

  const scored=DB
    .filter(m=>m.y>=yFrom&&m.y<=yTo&&(m.k==="Movie"?wM:wS))
    .map(m=>{
      let gs=0; m.g.forEach(g=>gs+=(w[g]||0));
      let ab=0; actors.forEach(a=>{if((m.c||"").toLowerCase().includes(a))ab+=5;});
      return{...m,_score:m.r*(1+gs*.2)+ab};
    }).sort((a,b)=>b._score-a._score);

  const seen=new Set(), picks=[];
  for(const m of scored){
    const k=m.g.slice().sort().join(",");
    if(!seen.has(k)||picks.length<3){picks.push(m);seen.add(k);}
    if(picks.length>=6)break;
  }
  for(const m of scored){if(picks.length>=6)break;if(!picks.includes(m))picks.push(m);}
  return picks.slice(0,6).map(m=>({...m,why:buildWhy(m,persons)}));
}

function buildWhy(m,persons){
  const matched=[];
  persons.forEach(p=>{
    const mg=MOOD_G[p.mood]||[];
    if(mg.some(g=>m.g.includes(g)))matched.push(p.name||"Someone");
    if(p.actor&&m.c&&m.c.toLowerCase().includes(p.actor.toLowerCase()))
      matched.push(`${p.name||"Someone"} (fan of ${p.actor})`);
  });
  const base=`Rated ${m.r.toFixed(1)}/10 on IMDB.`;
  if(matched.length)return`Chosen for ${[...new Set(matched)].slice(0,2).join(" & ")}'s mood. ${base}`;
  return`A great pick for the group. ${base}`;
}

/* ════════════════════════════════════════════════════
   PERSON CARDS
════════════════════════════════════════════════════ */
const MOODS=["","Happy & Lighthearted","Romantic","Sad / Emotional","Thrilled / Tense","Adventurous","Scared / Horror","Nostalgic","Inspired","Relaxed / Cozy","Laugh-out-loud Funny","Mind-bending","Action-pumped"];
const GENRES_UI=["","Action","Adventure","Animation","Biographical","Comedy","Crime","Documentary","Drama","Fantasy","Historical","Horror","Musical","Mystery","Romance","Sci-Fi","Superhero","Thriller","War","Western"];
const TYPES=["","Movie","Series"];
const ORDINALS=["","I","II","III","IV","V","VI","VII"];
let pc=0;

function addPerson(defaultName=""){
  pc++;
  const id=`p${pc}`, n=pc;
  const div=document.createElement("div");
  div.className="pcard"; div.id=id;
  div.innerHTML=`
    <div class="pcard-top">
      <span class="pcard-num">${ORDINALS[n]||n}.</span>
      <span class="pcard-name" id="${id}-nm">${defaultName||`Person ${n}`}</span>
      <button class="pcard-del" onclick="document.getElementById('${id}').remove()" title="Remove">✕</button>
    </div>
    <div class="pcard-body">
      <div class="field f-full">
        <label>Name</label>
        <input type="text" placeholder="e.g. Kiran" data-f="name" value="${defaultName}"
          oninput="document.getElementById('${id}-nm').textContent=this.value||'Person ${n}'"/>
      </div>
      <div class="field">
        <label>Mood right now</label>
        <select data-f="mood">${MOODS.map(m=>`<option value="${m}">${m||"— pick a mood —"}</option>`).join("")}</select>
      </div>
      <div class="field">
        <label>Movie or Series?</label>
        <select data-f="type">${TYPES.map(t=>`<option value="${t}">${t||"— no preference —"}</option>`).join("")}</select>
      </div>
      <div class="field">
        <label>Genre</label>
        <select data-f="genre">${GENRES_UI.map(g=>`<option value="${g}">${g||"— any genre —"}</option>`).join("")}</select>
      </div>
      <div class="field">
        <label>Favourite Actor / Director</label>
        <input type="text" placeholder="e.g. Shah Rukh Khan" data-f="actor"/>
      </div>
      <div class="field f-full">
        <label>Release Year Range</label>
        <div class="year-row">
          <input type="number" placeholder="From" min="1900" max="2025" data-f="yearFrom"/>
          <span class="year-sep">—</span>
          <input type="number" placeholder="To" min="1900" max="2025" data-f="yearTo"/>
        </div>
      </div>
    </div>`;
  document.getElementById("persons-list").appendChild(div);
  if(!defaultName) div.querySelector("[data-f='name']").focus();
}

function getPersons(){
  return[...document.querySelectorAll(".pcard")].map(card=>{
    const g=f=>card.querySelector(`[data-f="${f}"]`)?.value?.trim()||"";
    return{name:g("name")||"Someone",mood:g("mood"),genre:g("genre"),type:g("type"),actor:g("actor"),yearFrom:g("yearFrom"),yearTo:g("yearTo")};
  });
}

/* ════════════════════════════════════════════════════
   FIND MOVIES
════════════════════════════════════════════════════ */
function findMovies(){
  const persons=getPersons();
  if(!persons.length){alert("Add at least one person!");return;}
  ["find-btn-desk","find-btn-mob"].forEach(id=>{
    const b=document.getElementById(id);
    if(b){b.disabled=true;b.innerHTML=`<span class="spin"></span> Finding…`;}
  });
  document.getElementById("results").innerHTML=`<div class="loading-bar"><span class="spin"></span> Searching for the perfect match…</div>`;
  setTimeout(()=>{
    const movies=localRecs(persons);
    ["find-btn-desk","find-btn-mob"].forEach(id=>{
      const b=document.getElementById(id);
      if(b){b.disabled=false;b.innerHTML=`Find Our Movie &rarr;`;}
    });
    renderResults(movies,persons);
  },400);
}

function renderResults(movies,persons){
  const el=document.getElementById("results");
  const names=persons.map(p=>p.name).join(" & ");
  if(!movies.length){
    el.innerHTML=`<div class="no-res"><big>📽</big>No matches found. Try widening the year range or removing the genre filter.</div>`;
    return;
  }
  el.innerHTML=`
    <div class="res-intro">
      <h2>Our Picks</h2>
      <span class="res-for">— for ${names}</span>
      <span class="res-count">${movies.length} Selections</span>
    </div>
    <div class="movies-grid" id="grid"></div>`;
  const grid=document.getElementById("grid");
  movies.forEach((m,i)=>{
    const tc=m.k==="Series"?"tag-series":"tag-movie";
    const c=document.createElement("div");
    c.className="mcard"; c.style.animationDelay=`${i*.07}s`;
    c.innerHTML=`
      <div class="mcard-poster">
        <div class="mcard-poster-fallback" style="background:${posterGrad(m.g)}">${m.e||"🎬"}</div>
      </div>
      <span class="mcard-num">No. ${String(i+1).padStart(2,"0")}</span>
      <div class="mcard-body">
        <div class="mcard-title-row">
          <div class="mcard-title">${m.t}</div>
          <div class="mcard-rating">★ ${m.r.toFixed(1)}</div>
        </div>
        <div class="mcard-tags">
          <span class="tag tag-year">${m.y}</span>
          <span class="tag ${tc}">${m.k}</span>
        </div>
        <div class="mcard-why">${m.why}</div>
        ${m.c?`<div class="mcard-cast">${m.c}</div>`:""}
        <button class="mcard-more" onclick="openMov(${i},event)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 5.5v3M6 4v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          What's this about?
        </button>
      </div>`;
    grid.appendChild(c);
  });
  window._movies=movies;
  el.scrollIntoView({behavior:"smooth",block:"start"});
}

/* ════════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════════ */
function openMov(idx,e){
  if(e)e.stopPropagation();
  const m=window._movies[idx]; if(!m)return;
  const pg=posterGrad(m.g);
  document.getElementById("mbox-poster").innerHTML=
    `<div class="mbox-poster-fallback" style="background:${pg}">${m.e||"🎬"}</div>`;
  document.getElementById("mbox-genre-lbl").textContent=m.g[0]||"Film";
  document.getElementById("mbox-title").textContent=m.t;
  const tc=m.k==="Series"?"tag-series":"tag-movie";
  document.getElementById("mbox-meta").innerHTML=
    `<span class="tag tag-year">${m.y}</span><span class="tag ${tc}">${m.k}</span><span class="mbox-rating">★ ${m.r.toFixed(1)} / 10</span>`;
  document.getElementById("mbox-why").innerHTML=`<strong>Why this for you?</strong>${m.why}`;
  document.getElementById("mbox-desc").textContent=m.d||"A must-watch pick for your group.";
  document.getElementById("mbox-cast").textContent=m.c||"See IMDB for full cast.";
  const genreEl=document.getElementById("mbox-genres");
  genreEl.innerHTML="";
  m.g.forEach(g=>{
    const cfg=GC[g]||{c:"#6A5238",b:"rgba(106,82,56,.09)"};
    const s=document.createElement("span");
    s.className="mg";
    s.style.cssText=`color:${cfg.c};border-color:${cfg.c}55;background:${cfg.b};`;
    s.textContent=g; genreEl.appendChild(s);
  });
  document.getElementById("mbox-link").href=`https://www.imdb.com/title/${m.id}/`;
  document.getElementById("mov").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeMov(e){if(e.target===document.getElementById("mov"))closeMovDirect();}
function closeMovDirect(){document.getElementById("mov").classList.remove("open");document.body.style.overflow="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeMovDirect();});
let ty=0;
document.getElementById("mbox").addEventListener("touchstart",e=>{ty=e.touches[0].clientY;},{passive:true});
document.getElementById("mbox").addEventListener("touchmove",e=>{if(e.touches[0].clientY-ty>80)closeMovDirect();},{passive:true});

/* ── Init ── */
addPerson();
addPerson();
</script>
</body>
</html>
